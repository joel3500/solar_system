<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>J'apprends le système solaire</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    h1 {
      font-size: 3em;
      margin: 30px 20px;
      text-shadow: 0 0 10px rgba(255,255,0,0.6);
    }
    img {
      max-width: 80vw;
      max-height: 55vh;
      border-radius: 10px;
      box-shadow: 0 0 25px rgba(255,255,255,0.3);
    }
    nav {
      margin: 30px 0;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    nav a {
      color: black;
      background: #e8d49c;
      text-decoration: none;
      font-size: 1.5em;
      padding: 14px 26px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      transition: transform 0.2s;
    }
    nav a:hover {
      transform: scale(1.05);
    }
    @media (max-width: 700px) {
      nav a {
        font-size: 1.7em;
        padding: 16px 22px;
      }
    }
    footer {
      color: grey;
      margin-top: 20px;
      max-width: 90vw;
    }
    #langSwitcher {
      position: fixed;
      bottom: 12px;
      left: 12px;
      display: flex;
      gap: 6px;
      z-index: 9999;
    }
    .lang-btn {
      background: #a6e7e8;
      color: black;
      border: 0;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.4);
    }
    .lang-btn.active {
      outline: 2px solid white;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1 id="pageH1">J'apprends le système solaire</h1>

  <img id="pageImg" src="systeme_1.jpg" alt="Le système solaire">

  <nav>
    <a id="navVideo" href="systeme_5_video_incorporee.html">🎬 Petite vidéo</a>
    <a id="navStatic" href="systeme_6_connaissance_sans_scroll.html">📖 Information statique</a>
    <a id="navDynamic" href="systeme_7_connaissance_avec_scroll.html">📜 Information dynamique</a>
  </nav>

  <footer>
    <p id="pageFooter">&copy; Système Solaire - créé par Joel Sandé, Saguenay - à but éducatif : j'apprends en m'amusant.</p>
  </footer>

  <div id="langSwitcher"></div>

  <script src="i18n.js"></script>
  <script>
    document.title = SOLAR_TRANSLATIONS[getSolarLang()].indexTitle;
    initLanguageSwitcher('langSwitcher', function(lang) {
      const t = SOLAR_TRANSLATIONS[lang];
      document.title = t.indexTitle;
      document.getElementById('pageH1').textContent = t.indexH1;
      document.getElementById('pageImg').alt = t.indexImgAlt;
      document.getElementById('navVideo').textContent = t.indexNavVideo;
      document.getElementById('navStatic').textContent = t.indexNavStatic;
      document.getElementById('navDynamic').textContent = t.indexNavDynamic;
      document.getElementById('pageFooter').innerHTML = t.indexFooter;
    });
  </script>

</body>
</html>
